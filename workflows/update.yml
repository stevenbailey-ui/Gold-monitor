name: Update EOD data

on:
  schedule:
    # 21:30 UTC weekdays — after US market close. Adjust as you like.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run EOD updater
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HOLDINGS: ${{ secrets.HOLDINGS }}
        run: python scraper/update_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "eod-bot"
          git config user.email "eod-bot@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "EOD update $(date -u +%F)"
          git push
